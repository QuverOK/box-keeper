name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches:
      - main
      - master
      - 'feature/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Prettier
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Steiger (FSD)
        run: npm run steiger

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: ESLint
        run: npm run lint:ci

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
